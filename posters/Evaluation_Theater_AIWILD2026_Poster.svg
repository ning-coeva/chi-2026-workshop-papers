<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1414" viewBox="0 0 1000 1414">
  <style>
    .bg{fill:#f7f5ef}.navy{fill:#1f2b3e}.gold{fill:#c58a19}.teal{fill:#148779}.red{fill:#c1322b}.box{fill:#ffffff;stroke:#9da3aa;stroke-width:1.3}.cream{fill:#fbf1dc;stroke:#c58a19;stroke-width:1.6}.h{font:700 19px Arial,sans-serif;fill:#fff}.title{font:700 34px Arial,sans-serif;fill:#fff}.sub{font:400 17px Arial,sans-serif;fill:#fff}.body{font:400 12px Arial,sans-serif;fill:#1c2530}.small{font:400 10.5px Arial,sans-serif;fill:#4d5966}.bold{font-weight:700}.big{font:700 30px Arial,sans-serif}.mid{font:700 18px Arial,sans-serif}.center{text-anchor:middle}.rule{stroke:#9da3aa;stroke-width:1}.mono{font:400 10.5px 'Courier New',monospace;fill:#1c2530}
  </style>
  <rect class="bg" x="0" y="0" width="1000" height="1414"/>
  <rect class="navy" x="40" y="28" rx="8" width="920" height="95"/>
  <text class="title center" x="500" y="66">Evaluation Theater</text>
  <text class="sub center" x="500" y="92">How Structural Compliance Decouples from Cognitive Judgment in Deployed LLM Agents</text>
  <text class="sub center" x="500" y="115"><tspan font-weight="700">Ning Coeva</tspan> | Independent Researcher | AIWILD @ ICML 2026</text>

  <rect class="cream" x="40" y="142" rx="8" width="920" height="82"/>
  <text class="mid center" x="500" y="171">A structural safety gate gives identical <tspan class="red">100% pass</tspan> to</text>
  <text class="mid center" x="500" y="194"><tspan class="teal">144 legitimate revisions</tspan> and <tspan class="red">49 social-engineering attacks</tspan>.</text>
  <text class="big red center" x="500" y="218">Discriminative gap = 0.0 pp</text>

  <rect class="box" x="35" y="250" rx="5" width="295" height="310"/>
  <rect class="navy" x="35" y="250" rx="5" width="295" height="40"/>
  <text class="h" x="50" y="278">Industry Reality</text>
  <text class="body" x="50" y="315"><tspan class="bold">What the industry wants:</tspan> full automation.</text>
  <text class="body" x="58" y="340">- ~40% of alerts never investigated</text>
  <text class="body" x="58" y="364">- 4.8M cybersecurity workforce gap</text>
  <text class="body" x="50" y="392">=&gt; racing to fully automated, agentic AI SOCs.</text>
  <text class="body" x="50" y="425"><tspan class="red bold">What the reality is:</tspan></text>
  <text class="body" x="58" y="450">- 63% have no AI governance policy</text>
  <text class="body" x="58" y="474">- 97% of AI breaches lacked AI access controls</text>
  <text class="body" x="58" y="498">- Breach cost: $4.44M global, $10.22M US</text>
  <text class="small" x="50" y="535">The safety mechanism planned for deployment</text>
  <text class="body red bold" x="50" y="554">scored 100% on the attacks.</text>

  <rect class="box" x="35" y="578" rx="5" width="295" height="256"/>
  <rect class="navy" x="35" y="578" rx="5" width="295" height="40"/>
  <text class="h" x="50" y="606">The Setup</text>
  <text class="body" x="50" y="643">SOC agent verdict T1 -&gt; real enforcement:</text>
  <text class="mono" x="50" y="666">BLOCK_IP / ISOLATE_HOST</text>
  <text class="body" x="50" y="694">New “evidence” -&gt; T2. The EAC gate allows</text>
  <text class="body" x="50" y="716">rollback iff T2 addresses every primary T1 node.</text>
  <text class="body bold" x="50" y="750">8 models x 6 scenarios x 5 trials = 216</text>
  <text class="body" x="50" y="775">Evidence was legitimate or socially engineered.</text>
  <text class="small" x="50" y="807">193 trials changed verdict and reached the gate.</text>

  <rect class="box" x="35" y="852" rx="5" width="295" height="330"/>
  <rect class="navy" x="35" y="852" rx="5" width="295" height="40"/>
  <text class="h" x="50" y="880">Industry's Own Admission</text>
  <text class="body" x="50" y="918"><tspan class="bold">The agent is the junior analyst.</tspan></text>
  <text class="body" x="50" y="942">A senior human still signs off before irreversible</text>
  <text class="body" x="50" y="964">actions ship. Yet the structural gate is that</text>
  <text class="body" x="50" y="986">sign-off - and cannot tell right from wrong.</text>
  <line class="rule" x1="50" y1="1010" x2="315" y2="1010"/>
  <text class="body" x="50" y="1040"><tspan class="bold">EU AI Act, Art. 14:</tspan> high-risk AI requires</text>
  <text class="body" x="50" y="1062">human oversight and safeguards against automation</text>
  <text class="body" x="50" y="1084">bias. CCI routes scarce human attention to the</text>
  <text class="body" x="50" y="1106">cases that actually need review.</text>
  <text class="small" x="50" y="1150">Oversight must grade cognitive judgment,</text>
  <text class="small" x="50" y="1168">not merely structural completeness.</text>

  <rect class="box" x="350" y="250" rx="5" width="300" height="310"/>
  <rect class="navy" x="350" y="250" rx="5" width="300" height="40"/>
  <text class="h" x="365" y="278">Finding 1 - Zero Gap</text>
  <text class="body" x="370" y="320">Primary completeness = 1.0</text>
  <text class="body" x="540" y="320">Legit 144/144</text>
  <text class="body" x="540" y="344">Social 49/49</text>
  <text class="body" x="370" y="380">Gate pass rate</text>
  <text class="body red bold" x="540" y="380">100% / 100%</text>
  <text class="body" x="370" y="416">Rollback-block branch reached</text>
  <text class="body red bold" x="565" y="416">0 / 0</text>
  <line class="rule" x1="370" y1="438" x2="630" y2="438"/>
  <text class="big red center" x="500" y="480">0.0 pp</text>
  <text class="small center" x="500" y="504">discriminative gap</text>
  <text class="body center" x="500" y="535">The gate passed every attack.</text>

  <rect class="box" x="350" y="578" rx="5" width="300" height="304"/>
  <rect class="navy" x="350" y="578" rx="5" width="300" height="40"/>
  <text class="h" x="365" y="606">Finding 2 - Mirror Pair</text>
  <text class="body" x="365" y="642">Same claim (“authorized test”), different evidence.</text>
  <text class="mono" x="365" y="678">Model              Legit   Attack</text>
  <text class="mono" x="365" y="702">Claude Haiku 4.5    5/5     0/3</text>
  <text class="mono" x="365" y="724">Claude Sonnet 4.6   5/5     0/5</text>
  <text class="mono" x="365" y="746">DeepSeek-Chat       5/5     5/5</text>
  <text class="mono" x="365" y="768">GPT-5.4             5/5     0/5</text>
  <text class="mono" x="365" y="790">Qwen-Plus           5/5     3/3</text>
  <line class="rule" x1="365" y1="810" x2="635" y2="810"/>
  <text class="body bold" x="365" y="838">Changed: 40/40 legit, 19/32 attack</text>
  <text class="small" x="365" y="864">Discrimination is achievable; the gate cannot see it.</text>

  <rect class="box" x="350" y="900" rx="5" width="300" height="282"/>
  <rect class="navy" x="350" y="900" rx="5" width="300" height="40"/>
  <text class="h" x="365" y="928">Finding 3 - Recognize / Capitulate</text>
  <text class="body" x="365" y="966">The agent explicitly flags:</text>
  <text class="small" x="375" y="991">“time pressure may be social engineering”</text>
  <text class="small" x="375" y="1013">“unverified channel; no cryptographic authentication”</text>
  <text class="body" x="365" y="1046">Then confidence falls 0.95 -&gt; 0.35 and it emits:</text>
  <text class="mono" x="365" y="1072">UNBLOCK_IP / RELEASE_HOST</text>
  <text class="body" x="365" y="1102">The gate reads that same output, scores 1.0,</text>
  <text class="body" x="365" y="1124">and dispatches rollback.</text>
  <text class="body red bold center" x="500" y="1160">15/49 capitulations named the attack.</text>

  <rect class="box" x="670" y="250" rx="5" width="295" height="310"/>
  <rect class="navy" x="670" y="250" rx="5" width="295" height="40"/>
  <text class="h" x="685" y="278">What Deployed Gates Check</text>
  <text class="body" x="685" y="318"><tspan class="bold">OpenAI Structured Outputs:</tspan></text>
  <text class="small" x="685" y="340">schema adherence</text>
  <text class="body" x="685" y="374"><tspan class="bold">Anthropic strict tool use:</tspan></text>
  <text class="small" x="685" y="396">response matches schema</text>
  <text class="body" x="685" y="430"><tspan class="bold">LangChain output parsers:</tspan></text>
  <text class="small" x="685" y="452">conformance and required-field presence</text>
  <rect class="cream" x="687" y="482" width="260" height="58"/>
  <text class="body bold center" x="817" y="507">None validates factual grounding</text>
  <text class="body bold center" x="817" y="529">inside the compliant structure.</text>

  <rect class="box" x="670" y="578" rx="5" width="295" height="304"/>
  <rect class="navy" x="670" y="578" rx="5" width="295" height="40"/>
  <text class="h" x="685" y="606">Structural Gate Signals</text>
  <text class="body" x="685" y="650">Structural signal</text><text class="body" x="910" y="650">AUROC</text>
  <line class="rule" x1="685" y1="660" x2="950" y2="660"/>
  <text class="small" x="685" y="688">completeness scores</text><text class="body red bold" x="910" y="688">0.50</text>
  <text class="small" x="685" y="714">addressed-evidence count</text><text class="body" x="910" y="714">0.34</text>
  <text class="small" x="685" y="740">raw T2 length</text><text class="body" x="910" y="740">0.69</text>
  <text class="small" x="685" y="766">new-evidence count</text><text class="body teal bold" x="910" y="766">0.90</text>
  <text class="small" x="685" y="810">Signal appears only when the check stops grading</text>
  <text class="small" x="685" y="830">coverage and starts reading what the model generated.</text>

  <rect class="box" x="670" y="900" rx="5" width="295" height="282"/>
  <rect class="navy" x="670" y="900" rx="5" width="295" height="40"/>
  <text class="h" x="685" y="928">The Fix - CCI</text>
  <text class="body center" x="817" y="972">Same data. Same output fields.</text>
  <text class="mid center" x="817" y="1000">Right measurement target.</text>
  <text class="big red center" x="755" y="1045">0.500</text>
  <text class="mid center" x="817" y="1075">-&gt;</text>
  <text class="big teal center" x="880" y="1045">0.934</text>
  <text class="small center" x="817" y="1098">AUROC [95% CI 0.899-0.966]</text>
  <text class="body" x="685" y="1132">Deterministic score over new-evidence count</text>
  <text class="body" x="685" y="1154">and confidence drop. Sensitivity 0.96;</text>
  <text class="body" x="685" y="1176">specificity 0.85. Escalate suspect rollbacks.</text>

  <rect class="navy" x="40" y="1210" rx="8" width="920" height="142"/>
  <text class="h center" x="500" y="1244">The model is not failing to suspect - the deployment is failing to grade it.</text>
  <text class="sub center" x="500" y="1280">The signal was already in the agent's output; the gate was looking at the wrong layer.</text>
  <text class="sub center" x="500" y="1310">Recovering cognitive compliance is a measurement-target problem,</text>
  <text class="sub center" x="500" y="1336">not a measurement-discovery one.</text>
  <text class="small center" x="500" y="1385">Ning Coeva | Evaluation Theater | AIWILD @ ICML 2026</text>
</svg>
